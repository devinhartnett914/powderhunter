  thead th.col-group { background: var(--blue-dark); text-align: center; font-size: 0.7rem; letter-spacing: 0.05em; cursor: default; }
  thead th.col-group:hover { background: var(--blue-dark); }

  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.15s; }
  tbody tr:hover { background: var(--blue-light); }
  td { padding: 0.6rem 0.75rem; vertical-align: middle; }
  td.center { text-align: center; }
  td.resort-name { font-weight: 600; white-space: nowrap; }
  td.resort-name a { color: var(--blue); text-decoration: none; }
  td.resort-name a:hover { text-decoration: underline; }

  td a { color: var(--blue); text-decoration: none; }
  td a:hover { text-decoration: underline; }

  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-red { background: var(--red-light); color: #dc2626; }
  .badge-gray { background: var(--gray-100); color: var(--gray-500); }

    .controls input[type="text"] { width: 100%; }

</style>

const maxAcreage = Math.max(...resorts.map(r => r.acreage));

const columns = [
  {key:'name', label:'Resort', sortable:true},
  {key:'acreage', label:'Acreage', sortable:true, type:'number'},
  {key:'kidsFree', label:'Kids Free', sortable:true},
  {key:'skiAge', label:'Min Age', sortable:true, type:'number'},
  {key:'skiCost', label:'Max Cost/Day', sortable:true, type:'number'},
  {key:'daycare', label:'Daycare', sortable:true},
  {key:'daycareCost', label:'Cost/Day', sortable:true, type:'number'},
  {key:'airport', label:'Airport', sortable:true},
  {key:'iad1', label:'IAD', sortable:false},
  {key:'dca1', label:'DCA', sortable:false},
  {key:'airportDist', label:'Distance', sortable:true},
  {key:'majorAirport', label:'Airport', sortable:true},
  {key:'iad2', label:'IAD', sortable:false},
  {key:'dca2', label:'DCA', sortable:false},
  {key:'majorDist', label:'Distance', sortable:true},
];

let sortCol = 'acreage', sortDir = -1;

function flightsUrl(from, to) {
  return `https://www.google.com/travel/flights?q=flights+from+${from}+to+${to}`;
}

function kidsFreeOrder(v) {
  if (!v || v === 'No') return 0;
  const m = v.match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

function distMinutes(v) {
  if (!v) return 9999;
  let m = 0;
  const hr = v.match(/(\d+)\s*hr/); if (hr) m += parseInt(hr[1]) * 60;
  const mn = v.match(/(\d+)\s*min/); if (mn) m += parseInt(mn[1]);
  return m || 9999;
}

function getSortVal(r, col) {
  if (col === 'skiCost' || col === 'daycareCost') return r[col] || 0;
  if (col === 'acreage' || col === 'skiAge') return r[col];
  if (col === 'kidsFree') return kidsFreeOrder(r[col]);
  if (col === 'airportDist' || col === 'majorDist') return distMinutes(r[col]);
  if (col === 'daycare') return r[col] === 'Yes' ? 1 : 0;
  return (r[col] || '').toString().toLowerCase();
}

function renderHeaders() {
  const tr = document.getElementById('headerRow');
  tr.innerHTML = '';
  columns.forEach(c => {
    const th = document.createElement('th');
    const isSorted = sortCol === c.key;
    th.className = isSorted ? 'sorted' : '';
    const arrow = !c.sortable ? '' : isSorted ? (sortDir === 1 ? ' \u25B2' : ' \u25BC') : ' \u25B4';
    th.innerHTML = c.label + (c.sortable ? `<span class="sort-icon">${arrow}</span>` : '');
    if (c.sortable) th.onclick = () => { if (sortCol === c.key) sortDir *= -1; else { sortCol = c.key; sortDir = c.type === 'number' ? -1 : 1; } render(); };
    tr.appendChild(th);
  });
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const fDaycare = document.getElementById('filterDaycare').value;
  const fKids = document.getElementById('filterKidsFree').value;
  const fAcreage = parseInt(document.getElementById('filterAcreage').value);
  const fCost = parseInt(document.getElementById('filterCost').value);

  let filtered = resorts.filter(r => {
    if (search && !r.name.toLowerCase().includes(search)) return false;
    if (fDaycare && r.daycare !== fDaycare) return false;
    if (fKids) { if (fKids === 'No' && r.kidsFree !== 'No') return false; if (fKids !== 'No' && kidsFreeOrder(r.kidsFree) < kidsFreeOrder(fKids)) return false; }
    if (r.acreage < fAcreage) return false;
    if (r.skiCost > fCost) return false;
    return true;
  });

  filtered.sort((a, b) => {
    const av = getSortVal(a, sortCol), bv = getSortVal(b, sortCol);
    if (av < bv) return -1 * sortDir; if (av > bv) return 1 * sortDir; return 0;
  });

  renderHeaders();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    const pct = Math.round((r.acreage / maxAcreage) * 100);

    const kidsBadge = r.kidsFree === 'No' ? `<span class="badge badge-gray">No</span>` :
      kidsFreeOrder(r.kidsFree) >= 13 ? `<span class="badge badge-green">${r.kidsFree}</span>` :
      kidsFreeOrder(r.kidsFree) >= 7 ? `<span class="badge badge-amber">${r.kidsFree}</span>` :
      `<span class="badge badge-gray">${r.kidsFree}</span>`;
    const kidsFreeHtml = r.kidsFreeLink ? `<a href="${r.kidsFreeLink}" target="_blank">${kidsBadge}</a>` : kidsBadge;

    const daycareHtml = r.daycare === 'Yes'
      ? (r.daycareLink ? `<a href="${r.daycareLink}" target="_blank"><span class="badge badge-green">Yes</span></a>` : `<span class="badge badge-green">Yes</span>`)
      : `<span class="badge badge-gray">No</span>`;

    tr.innerHTML = `
      <td class="resort-name"><a href="${r.nameLink}" target="_blank">${r.name}</a></td>
      <td><div class="acreage-bar"><div class="bar" style="width:${pct}px"></div><span>${r.acreage.toLocaleString()}</span></div></td>
      <td class="center">${kidsFreeHtml}</td>
      <td class="center"><a href="${r.skiAgeLink}" target="_blank">${r.skiAge}</a></td>
      <td class="center"><a href="${r.skiCostLink}" target="_blank">$${r.skiCost}</a></td>
      <td class="center">${daycareHtml}</td>
      <td class="center">${r.daycareCost ? '$'+r.daycareCost : '-'}</td>
      <td style="white-space:nowrap">${r.airport}</td>
      <td class="center"><a class="flight-link" href="${flightsUrl('IAD',r.ac)}" target="_blank">IAD</a></td>
      <td class="center"><a class="flight-link" href="${flightsUrl('DCA',r.ac)}" target="_blank">DCA</a></td>
      <td class="center">${r.airportDist}</td>
      <td style="white-space:nowrap">${r.majorAirport}</td>
      <td class="center"><a class="flight-link" href="${flightsUrl('IAD',r.mc)}" target="_blank">IAD</a></td>
      <td class="center"><a class="flight-link" href="${flightsUrl('DCA',r.mc)}" target="_blank">DCA</a></td>
      <td class="center">${r.majorDist}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('resortCount').textContent = `${filtered.length} resort${filtered.length !== 1 ? 's' : ''}`;
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filterDaycare').value = '';
  document.getElementById('filterKidsFree').value = '';
  document.getElementById('filterAcreage').value = '0';
  document.getElementById('filterCost').value = '9999';
  sortCol = 'acreage'; sortDir = -1;
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterDaycare').addEventListener('change', render);
document.getElementById('filterKidsFree').addEventListener('change', render);
document.getElementById('filterAcreage').addEventListener('change', render);
document.getElementById('filterCost').addEventListener('change', render);

render();
</script>
